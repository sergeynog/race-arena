<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Catalyst Reader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #17181c;
      --surface2: #1e1f25;
      --border: #2a2b32;
      --accent: #e8ff3b;
      --accent2: #ff6b2b;
      --text: #f0f0f2;
      --muted: #7a7b85;
      --green: #3bff8a;
      --red: #ff3b5c;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      padding: 20px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 13px;
      color: #000;
      letter-spacing: -0.5px;
    }

    .logo-text { font-size: 17px; font-weight: 700; }
    .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

    /* ── Device Status Bar ── */
    .status-bar {
      margin: 12px 16px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .status-dot.scanning { background: var(--accent); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-info { flex: 1; }
    .status-label { font-size: 13px; font-weight: 600; }
    .status-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .scan-btn {
      padding: 7px 14px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
    }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Section ── */
    .section-header {
      padding: 16px 16px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .session-count {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      padding: 3px 8px;
      border-radius: 20px;
    }

    /* ── Session List ── */
    #session-list { padding: 0 16px 16px; }

    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }

    .session-card:active { background: var(--surface2); }
    .session-card:hover { border-color: #3a3b42; }

    .session-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .session-date { font-size: 15px; font-weight: 700; }
    .session-time-badge {
      font-size: 14px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      font-family: 'SF Mono', 'Courier New', monospace;
    }

    .session-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat { }
    .stat-val { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; line-height: 1.5; }

    /* ── Detail View ── */
    #detail-view {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      overflow-y: auto;
      z-index: 20;
      max-width: 480px;
      margin: 0 auto;
    }

    .detail-header {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 5;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      flex-shrink: 0;
    }

    .detail-title { font-size: 17px; font-weight: 700; }
    .detail-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .detail-body { padding: 16px; }

    /* ── Hero stat ── */
    .hero-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
    }

    .hero-val {
      font-size: 42px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      font-family: 'SF Mono', 'Courier New', monospace;
      letter-spacing: -1px;
    }

    .hero-label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }

    /* ── Stats Grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .stat-card-val { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat-card-label { font-size: 11px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* ── Lap Table ── */
    .laps-section { margin-bottom: 16px; }
    .laps-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .lap-row {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .lap-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      margin-right: 12px;
    }

    .lap-num.best { background: var(--accent); color: #000; }

    .lap-time {
      font-size: 17px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Courier New', monospace;
      flex: 1;
    }

    .lap-delta {
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Courier New', monospace;
    }
    .lap-delta.minus { color: var(--green); }
    .lap-delta.plus { color: var(--red); }

    .lap-speed { font-size: 12px; color: var(--muted); margin-left: 12px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      transition: transform 0.3s ease;
      z-index: 99;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Loading ── */
    .loading { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<!-- ══ MAIN VIEW ════════════════════════════════════════════ -->
<div id="main-view">
  <header>
    <div class="logo">
      <div class="logo-icon">GC</div>
      <div>
        <div class="logo-text">Catalyst Reader</div>
        <div class="logo-sub">Garmin FIT Session Viewer</div>
      </div>
    </div>
  </header>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-info">
      <div class="status-label" id="status-label">Waiting for device…</div>
      <div class="status-sub" id="status-sub">Plug in Catalyst via USB</div>
    </div>
    <button class="scan-btn" id="scan-btn" onclick="triggerScan()">Scan</button>
  </div>

  <div class="section-header">
    <div class="section-title">Sessions</div>
    <div class="session-count" id="session-count">0</div>
  </div>

  <div id="session-list">
    <div class="loading">Loading sessions…</div>
  </div>
</div>

<!-- ══ DETAIL VIEW ══════════════════════════════════════════ -->
<div id="detail-view">
  <div class="detail-header">
    <div class="back-btn" onclick="closeDetail()">←</div>
    <div>
      <div class="detail-title" id="detail-title">Session</div>
      <div class="detail-sub" id="detail-sub"></div>
    </div>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<div id="toast"></div>

<script>
// ── SSE Connection ────────────────────────────────────────
const evtSource = new EventSource('/events');

evtSource.onmessage = (e) => {
  const data = JSON.parse(e.data);

  if (data.type === 'status') updateStatusBar(data);
  if (data.type === 'imported') {
    showToast(`Imported: ${data.session.id}`);
    loadSessions();
  }
};

// ── Status Bar ────────────────────────────────────────────
function updateStatusBar(status) {
  const dot = document.getElementById('status-dot');
  const label = document.getElementById('status-label');
  const sub = document.getElementById('status-sub');
  const btn = document.getElementById('scan-btn');

  dot.className = 'status-dot';

  if (status.scanning) {
    dot.classList.add('scanning');
    label.textContent = 'Scanning…';
    sub.textContent = 'Reading FIT files from device';
    btn.disabled = true;
  } else if (status.connected) {
    dot.classList.add('connected');
    label.textContent = 'Device Connected';
    sub.textContent = status.volume + (status.fileCount ? ` · ${status.fileCount} file(s)` : '');
    btn.disabled = false;
  } else {
    label.textContent = 'No Device';
    sub.textContent = 'Plug in Catalyst via USB, then tap Scan';
    btn.disabled = false;
  }
}

// ── Sessions List ─────────────────────────────────────────
async function loadSessions() {
  const list = document.getElementById('session-list');
  const count = document.getElementById('session-count');

  try {
    const res = await fetch('/api/sessions');
    const sessions = await res.json();
    count.textContent = sessions.length;

    if (sessions.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🏎️</div>
          <div class="empty-title">No sessions yet</div>
          <div class="empty-sub">Plug in your Catalyst via USB and tap <strong>Scan</strong> to import sessions.</div>
        </div>`;
      return;
    }

    list.innerHTML = sessions.map(s => sessionCard(s)).join('');
  } catch {
    list.innerHTML = `<div class="empty-state"><div class="empty-sub">Could not load sessions.</div></div>`;
  }
}

function sessionCard(s) {
  const date = s.date ? fmtDate(s.date) : s.id;
  const dist = s.totalDistance ? (s.totalDistance * 0.621371).toFixed(1) + ' mi' : '--';
  const spd = s.maxSpeed ? s.maxSpeed.toFixed(0) + ' mph' : '--';

  return `
    <div class="session-card" onclick="openSession('${s.id}')">
      <div class="session-card-top">
        <div class="session-date">${date}</div>
        <div class="session-time-badge">${s.totalTimeFmt || '--'}</div>
      </div>
      <div class="session-stats">
        <div class="stat">
          <div class="stat-val">${s.lapCount || 0}</div>
          <div class="stat-label">Laps</div>
        </div>
        <div class="stat">
          <div class="stat-val">${spd}</div>
          <div class="stat-label">Top Speed</div>
        </div>
        <div class="stat">
          <div class="stat-val">${dist}</div>
          <div class="stat-label">Distance</div>
        </div>
      </div>
    </div>`;
}

// ── Detail View ───────────────────────────────────────────
async function openSession(id) {
  const view = document.getElementById('detail-view');
  const body = document.getElementById('detail-body');
  view.style.display = 'block';
  body.innerHTML = '<div class="loading">Loading…</div>';

  const res = await fetch(`/api/sessions/${id}`);
  const s = await res.json();

  document.getElementById('detail-title').textContent = s.date ? fmtDate(s.date) : s.id;
  document.getElementById('detail-sub').textContent = `${s.lapCount} laps · ${s.file}`;

  const dist = s.totalDistance ? (s.totalDistance * 0.621371).toFixed(2) + ' mi' : '--';
  const maxSpd = s.maxSpeed ? s.maxSpeed.toFixed(1) + ' mph' : '--';
  const avgSpd = s.avgSpeed ? s.avgSpeed.toFixed(1) + ' mph' : '--';

  // Find best lap
  let bestLapIdx = -1;
  let bestTime = Infinity;
  (s.laps || []).forEach((lap, i) => {
    if (lap.totalTime && lap.totalTime < bestTime) { bestTime = lap.totalTime; bestLapIdx = i; }
  });

  const lapRows = (s.laps || []).map((lap, i) => {
    const isBest = i === bestLapIdx;
    const delta = (s.laps.length > 1 && !isBest && bestTime < Infinity)
      ? lap.totalTime - bestTime : null;
    const deltaStr = delta !== null
      ? (delta >= 0 ? `+${delta.toFixed(3)}` : delta.toFixed(3))
      : '';
    const deltaClass = delta === null ? '' : delta > 0 ? 'plus' : 'minus';
    const spd = lap.maxSpeed ? lap.maxSpeed.toFixed(0) + ' mph' : '';

    return `
      <div class="lap-row">
        <div class="lap-num ${isBest ? 'best' : ''}">${i + 1}</div>
        <div class="lap-time">${lap.totalTimeFmt || '--'}</div>
        <div class="lap-delta ${deltaClass}">${deltaStr}</div>
        <div class="lap-speed">${spd}</div>
      </div>`;
  }).join('');

  body.innerHTML = `
    <div class="hero-stat">
      <div class="hero-val">${s.totalTimeFmt || '--'}</div>
      <div class="hero-label">Total Session Time</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-card-val">${s.lapCount || 0}</div>
        <div class="stat-card-label">Laps</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val">${maxSpd}</div>
        <div class="stat-card-label">Top Speed</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val">${avgSpd}</div>
        <div class="stat-card-label">Avg Speed</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-val">${dist}</div>
        <div class="stat-card-label">Distance</div>
      </div>
    </div>

    ${s.laps?.length ? `
    <div class="laps-section">
      <div class="laps-title">Lap Times <span style="color:var(--accent);font-size:10px;margin-left:6px;">BEST HIGHLIGHTED</span></div>
      ${lapRows}
    </div>` : ''}

    ${s.coaching?.length ? `
    <div class="laps-section">
      <div class="laps-title">Coaching Notes</div>
      ${s.coaching.map(c => `<div class="lap-row" style="font-size:13px;">${JSON.stringify(c)}</div>`).join('')}
    </div>` : ''}
  `;
}

function closeDetail() {
  document.getElementById('detail-view').style.display = 'none';
}

// ── Scan ──────────────────────────────────────────────────
async function triggerScan() {
  const btn = document.getElementById('scan-btn');
  btn.disabled = true;
  btn.textContent = '…';
  try {
    const res = await fetch('/api/scan', { method: 'POST' });
    const data = await res.json();
    if (!data.connected) {
      showToast('No Garmin device found');
    } else if (data.imported === 0) {
      showToast(`No new sessions (${data.skipped} already imported)`);
    } else {
      showToast(`Imported ${data.imported} session(s)`);
      loadSessions();
    }
  } finally {
    btn.disabled = false;
    btn.textContent = 'Scan';
  }
}

// ── Helpers ───────────────────────────────────────────────
function fmtDate(dateStr) {
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  } catch { return dateStr; }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Init ──────────────────────────────────────────────────
loadSessions();

// Also fetch initial status
fetch('/api/status').then(r => r.json()).then(updateStatusBar);
</script>
</body>
</html>
